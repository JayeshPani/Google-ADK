<header class="site-header sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-[#EBE9E4] px-6 py-3">
  <a href="/" class="brand-lockup flex items-center gap-3" aria-label="Refine home">
    <img src="{{ static_path('img/refine-logo-header.png') }}" alt="Refine" class="brand-logo-img">
  </a>
  <nav class="site-nav hidden md:flex items-center gap-8 text-sm font-medium">
    <a href="/diagnose" class="{{ 'text-gray-900' if active_item == 'diagnose' else 'text-gray-500 hover:text-[#986848]' }} transition-colors">New Diagnosis</a>
    <a href="/compare" class="{{ 'text-gray-900' if active_item == 'compare' else 'text-gray-500 hover:text-[#986848]' }} transition-colors">Compare JDs</a>
    <a href="/history" class="{{ 'text-gray-900' if active_item == 'history' else 'text-gray-500 hover:text-[#986848]' }} transition-colors">History</a>
    {% if not user_authenticated %}
    <a href="/login" class="{{ 'text-gray-900' if active_item == 'login' else 'text-gray-500 hover:text-[#986848]' }} transition-colors">Account</a>
    {% endif %}
    <button
      type="button"
      class="theme-toggle text-gray-400 hover:text-[#986848] transition-colors"
      data-theme-toggle
      aria-label="Switch to dark mode"
      aria-pressed="false"
      title="Switch to dark mode"
    >
      <span class="theme-icon-sun">{{ icon_svg("lucide:sun", "app-icon-lg") }}</span>
      <span class="theme-icon-moon">{{ icon_svg("lucide:moon", "app-icon-lg") }}</span>
    </button>
  </nav>
  <div class="site-actions flex items-center gap-4">
    {% if user_authenticated %}
    <div class="hidden lg:block max-w-[120px] truncate text-sm px-4 py-2 border border-[#EBE9E4] rounded-xl bg-white">
      {{ user_email }}
    </div>
    <form method="post" action="/logout" class="shrink-0">
      <button type="submit" class="whitespace-nowrap min-w-[96px] text-sm px-5 py-2.5 rounded-xl bg-[#986848] text-white hover:bg-[#683820] transition-colors">
        Sign Out
      </button>
    </form>
    {% else %}
    <a href="/login?next_path={{ request.url.path }}" class="whitespace-nowrap min-w-[88px] text-center text-sm px-5 py-2.5 rounded-xl bg-[#986848] text-white hover:bg-[#683820] transition-colors">
      Sign In
    </a>
    {% endif %}
  </div>
</header>
